name: Update Construct 3 Docs

# Runs every Wednesday 10:00 UTC (after Scirra's typical Tuesday evening UK release)
on:
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:  # manual trigger

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(node -e "
            const fs = require('fs');
            try {
              const v = JSON.parse(fs.readFileSync('VERSION', 'utf8'));
              process.stdout.write(v.savedWithRelease || 'unknown');
            } catch { process.stdout.write('unknown'); }
          ")
          LATEST=$(node -e "
            const https = require('https');
            const req = https.get('https://editor.construct.net/versions.json', {
              headers: { 'User-Agent': 'Mozilla/5.0' }
            }, res => {
              let d = '';
              res.on('data', c => d += c);
              res.on('end', () => {
                const v = JSON.parse(d);
                const s = v.find(x => x.branchName === 'Stable');
                process.stdout.write(s ? s.releaseName : 'unknown');
              });
            });
            req.on('error', () => process.stdout.write('unknown'));
          ")
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No update needed"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Update available: $CURRENT -> $LATEST"
          fi

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: cd .scripts && npm install

      - name: Install Chrome + xvfb
        if: steps.check.outputs.changed == 'true'
        run: sudo apt-get update && sudo apt-get install -y xvfb google-chrome-stable

      - name: Scrape Manual
        if: steps.check.outputs.changed == 'true'
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: cd .scripts && xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" node autonomous-scraper.js manual --force

      - name: Scrape Addon SDK
        if: steps.check.outputs.changed == 'true'
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: cd .scripts && xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" node autonomous-scraper.js addon-sdk --force

      - name: Scrape Game Services
        if: steps.check.outputs.changed == 'true'
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: cd .scripts && xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" node autonomous-scraper.js game-services --force

      - name: Update README
        if: steps.check.outputs.changed == 'true'
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const count = dir => {
              let n = 0;
              const walk = d => {
                for (const e of fs.readdirSync(d, { withFileTypes: true })) {
                  if (e.isDirectory()) walk(path.join(d, e.name));
                  else if (e.name.endsWith('.md')) n++;
                }
              };
              walk(dir);
              return n;
            };
            const manual = count('Construct3-Manual');
            const sdk = count('Construct3-Addon-SDK');
            const gs = count('Construct3-Game-Services');
            const total = manual + sdk + gs;
            const latest = '${{ steps.check.outputs.latest }}';
            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme
              .replace(/release-r[\w.]+-blue/, 'release-' + latest + '-blue')
              .replace(/\| \[Manual\].+\| \d+ \|/, '| [Manual](Construct3-Manual/index.md) | ' + manual + ' |')
              .replace(/\| \[Addon SDK\].+\| \d+ \|/, '| [Addon SDK](Construct3-Addon-SDK/index.md) | ' + sdk + ' |')
              .replace(/\| \[Game Services\].+\| \d+ \|/, '| [Game Services](Construct3-Game-Services/index.md) | ' + gs + ' |')
              .replace(/\| \*\*Total\*\* \| \*\*\d+\*\*/, '| **Total** | **' + total + '**')
              .replace(/\| Construct 3 Manual \| r[\w.]+ \|/, '| Construct 3 Manual | ' + latest + ' |')
              .replace(/\| Addon SDK \| r[\w.]+ \|/, '| Addon SDK | ' + latest + ' |')
              .replace(/\| Game Services \| r[\w.]+ \|/, '| Game Services | ' + latest + ' |');
            fs.writeFileSync('README.md', readme);
            console.log('Manual:', manual, 'SDK:', sdk, 'GS:', gs, 'Total:', total);
          "

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update documentation to ${{ steps.check.outputs.latest }}"
          title: "Update documentation to ${{ steps.check.outputs.latest }}"
          body: |
            ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}

            Auto-scraped from construct.net.
          branch: docs-${{ steps.check.outputs.latest }}
          delete-branch: true
